{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pennyos.authSecretName" . }}
  labels:
    {{- include "pennyos.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.sessionSigningKeyKey }}: {{ required "auth.sessionSigningKey is required when auth.existingSecret is empty" .Values.auth.sessionSigningKey | quote }}
{{- end }}
