{{- if .Values.ingress.enabled }}
{{- $webHost := required "ingress.web.host is required when ingress.enabled=true" .Values.ingress.web.host -}}
{{- $separateAPIHost := .Values.ingress.api.separateHost.enabled -}}
{{- $apiHost := .Values.ingress.api.separateHost.host -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pennyos.fullname" . }}
  labels:
    {{- include "pennyos.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- if or .Values.ingress.web.tls.enabled (and $separateAPIHost .Values.ingress.api.separateHost.tls.enabled) }}
  tls:
    {{- if .Values.ingress.web.tls.enabled }}
    - hosts:
        - {{ $webHost | quote }}
      secretName: {{ default (printf "%s-web-tls" (include "pennyos.fullname" .)) .Values.ingress.web.tls.secretName | quote }}
    {{- end }}
    {{- if and $separateAPIHost .Values.ingress.api.separateHost.tls.enabled }}
    - hosts:
        - {{ required "ingress.api.separateHost.host is required when ingress.api.separateHost.enabled=true" $apiHost | quote }}
      secretName: {{ default (printf "%s-api-tls" (include "pennyos.fullname" .)) .Values.ingress.api.separateHost.tls.secretName | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if $separateAPIHost }}
    - host: {{ $webHost | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.webPathPrefix | quote }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "pennyos.webServiceName" . }}
                port:
                  number: {{ .Values.web.service.port }}
    - host: {{ required "ingress.api.separateHost.host is required when ingress.api.separateHost.enabled=true" $apiHost | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.apiPathPrefix | quote }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "pennyos.apiServiceName" . }}
                port:
                  number: {{ .Values.api.service.port }}
    {{- else }}
    - host: {{ $webHost | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.apiPathPrefix | quote }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "pennyos.apiServiceName" . }}
                port:
                  number: {{ .Values.api.service.port }}
          - path: {{ .Values.ingress.webPathPrefix | quote }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "pennyos.webServiceName" . }}
                port:
                  number: {{ .Values.web.service.port }}
    {{- end }}
{{- end }}
