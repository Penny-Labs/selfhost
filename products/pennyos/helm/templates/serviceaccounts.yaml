{{- if .Values.api.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pennyos.apiServiceAccountName" . }}
  labels:
    {{- include "pennyos.api.labels" . | nindent 4 }}
  {{- with .Values.api.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.api.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- if .Values.web.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pennyos.webServiceAccountName" . }}
  labels:
    {{- include "pennyos.web.labels" . | nindent 4 }}
  {{- with .Values.web.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.web.serviceAccount.automountServiceAccountToken }}
{{- end }}
{{- if .Values.migrations.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pennyos.migrationsServiceAccountName" . }}
  labels:
    {{- include "pennyos.api.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  {{- with .Values.migrations.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.migrations.serviceAccount.automountServiceAccountToken }}
{{- end }}
