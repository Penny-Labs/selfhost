apiVersion: v1
kind: Service
metadata:
  name: {{ include "pennyos.webServiceName" . }}
  labels:
    {{- include "pennyos.web.labels" . | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: {{ .Values.web.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "pennyos.web.selectorLabels" . | nindent 4 }}
